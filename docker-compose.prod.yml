version: '3.8'

services:
  minio:
    image: quay.io/minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - ./minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  server:
    image: ghcr.io/khushwant-singh1/gyanmitra-server:latest
    env_file:
      - server/.env
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - PORT=8000
      - CLIENT_URL=http://frontend:3000
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_USE_SSL=false
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=gyanmitra
      - MINIO_PUBLIC_URL=https://api.gyanmitranews.com/minio/gyanmitra
    depends_on:
      - minio
    volumes:
      - ./uploads:/usr/src/app/uploads
    restart: unless-stopped

  client:
    image: ghcr.io/khushwant-singh1/gyanmitra-client:latest
    ports:
      - "8080:80"
    restart: unless-stopped

  frontend:
    image: ghcr.io/khushwant-singh1/gyanmitra-frontend:latest
    env_file:
      - frontend-server/.env
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_URL=http://server:8000
      - WEBSITE_URL=http://localhost:3000
    depends_on:
      - server
      - client
    restart: unless-stopped

networks:
  default:
    driver: bridge
