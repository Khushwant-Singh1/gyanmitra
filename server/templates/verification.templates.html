<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Verification Code</title>
  </head>
  <body style="background-color: #f4f4f4; text-align: center; padding: 20px">
    <div
      style="
        background: #001f3f;
        color: #ffffff;
        border-radius: 8px;
        padding: 30px;
        max-width: 600px;
        margin: auto;
        font-family: Arial, sans-serif;
      "
    >
      <!-- Company Logo and Name -->
      <div style="margin-bottom: 20px">
        <img
          src="https://gyanmitranews.com/assets/gyanmitra.png"
          alt="Company Logo"
          style="max-width: 100px; margin-bottom: 10px"
        />
        <h2 style="margin: 0; font-size: 24px">Gyanmitra</h2>
      </div>

      <h1 style="text-decoration: underline; margin-bottom: 20px">
        Your Verification Code
      </h1>
      <p style="font-size: 16px; line-height: 1.5">
        Your verification code is: <strong>{verificationCode}</strong>
      </p>
      <p style="font-size: 16px; line-height: 1.5; margin-bottom: 40px">
        Please enter this code to verify your email account.
      </p>

      <div
        style="
          margin-top: 20px;
          color: #555555;
          font-size: 14px;
          font-family: Arial, sans-serif;
        "
      >
        <p>
          If you have any questions, feel free to
          <a
            href="https://gyanmitranews.com/contact-us"
            style="color: #007bff; text-decoration: none"
            >contact us</a
          >.
        </p>
        <p>&copy; {currentYear} Gyanmitranews. All rights reserved.</p>
      </div>
    </div>
  </body>
</html>
