name: Build and Deploy via GHCR

on:
  push:
    branches:
      - main # Change this if your default branch is different
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Lowercase Repository Owner Name
        id: prep
        run: |
          # Use GITHUB_REPOSITORY_OWNER or GHCR_USERNAME (converted to lowercase)
          OWNER="${{ secrets.GHCR_USERNAME }}"
          echo "owner=${OWNER,,}" >> $GITHUB_OUTPUT

      - name: Build and Push Server Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.prep.outputs.owner }}/gyanmitra-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Client Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: client/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.prep.outputs.owner }}/gyanmitra-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend-server/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.prep.outputs.owner }}/gyanmitra-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare production docker-compose
        run: cp docker-compose.prod.yml docker-compose.yml

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || 22 }}
          source: "docker-compose.yml"
          target: "${{ secrets.HOSTINGER_DEPLOY_PATH }}"

      - name: SSH Deploy to Hostinger VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          HOSTINGER_DEPLOY_PATH: ${{ secrets.HOSTINGER_DEPLOY_PATH }}
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || 22 }}
          envs: GHCR_USERNAME,GHCR_TOKEN,HOSTINGER_DEPLOY_PATH
          script: |
            # Log in to GHCR on the VPS using the Personal Access Token (PAT)
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            
            # Go to the deployment path on the VPS
            cd "$HOSTINGER_DEPLOY_PATH"
            
            # Pull the prebuilt Docker images from GHCR
            docker compose pull
            
            # Re-launch the containers
            docker compose up -d
            
            # Clean up old/unused images to save disk space
            docker image prune -f
